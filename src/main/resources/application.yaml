spring:
  application:
    name: payflow_worker

  datasource:
    url: jdbc:postgresql://localhost:5432/my_database
    username: my_user
    password: my_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        order_updates: true
        order_inserts: true
        format_sql: true
        default_schema: payflow_app

  flyway:
    enabled: false


server:
  port: 8080

jwt:
  secret-key: bXlTdXBlclNlY3JldEtleVRoYXRJc0xvbmdFbm91Z2g=
  expiration: 86400000

logging:
  level:
    root: INFO
    com.example: DEBUG
    org.camunda.bpm.engine: INFO
    org.camunda.bpm.engine.persistence: INFO


camunda.bpm.client:
  base-url: http://localhost:8082/engine-rest
  worker-id: payflow-app-1
  async-response-timeout: 20000
  lock-duration: 30000
  max-tasks: 10
  basic-auth:
    username: ${CAMUNDA_USER:admin}
    password: ${CAMUNDA_PASSWORD:admin}

camunda:
  engine:
    base-url: http://localhost:8082/engine-rest
    username: ${CAMUNDA_USER:admin}
    password: ${CAMUNDA_PASSWORD:admin}